databaseChangeLog:
  - changeSet:
      id: 001-create-show-table
      author: fmi
      changes:
        - createTable:
            tableName: show
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: genre
                  type: VARCHAR(32)
              - column:
                  name: duration_minutes
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: age_rating
                  type: VARCHAR(16)